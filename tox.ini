[tox]
envlist = py311, flake8, bandit, pip-audit
skip_missing_interpreters = true

[testenv]
deps = .[dev]
commands = pytest {posargs}

[testenv:flake8]
deps = flake8
commands = flake8 src/ tests/

[testenv:bandit]
deps = bandit
commands = bandit -r src/novabucks/ -ll

[testenv:pip-audit]
deps =
    .
    pip-audit
commands_pre = python -m pip install --upgrade pip
commands = pip-audit --skip-editable

[flake8]
max-line-length = 120
exclude = .venv,build,dist,.tox,.eggs
